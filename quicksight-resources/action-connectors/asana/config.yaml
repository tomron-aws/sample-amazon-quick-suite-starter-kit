name: asana-action-connector
version: 1.0.0
iac_type: terraform
dependencies:
  - governance/subscription
params:
  - name: secret_arn
    required: true
    description: "ARN of the AWS Secrets Manager secret containing the Asana Personal Access Token"
  - name: workspace_id
    required: false
    default: ""
    description: "Asana workspace ID to scope connector actions (optional)"
  - name: admin_pro_group
    required: true
    description: "IAM Identity Center group name granted admin access to this connector"
