name: subscription
version: 0.1.0
status: ready
iac_type: terraform
dependencies:
  - core/custom-resources
params:
  - name: identity_center_instance_arn
    required: true
    type: arn
    pattern: "^arn:aws:sso:::instance/ssoins-.+$"
  - name: identity_store_id
    required: true
    type: string
    pattern: "^d-[a-zA-Z0-9]+$"
  - name: account_name
    required: false
    default: QuickSuiteStarterKit
    type: string
  - name: admin_user_email
    required: true
    type: email
  - name: admin_pro_group
    required: true
    type: string
  - name: group_role_mappings
    required: false
    default: "[]"
    type: json
artifacts:
  - cfn-template.yaml
  - terraform/main.tf
