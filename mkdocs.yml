site_name: Amazon Quick Suite Starter Kit
site_description: Starter kit for deploying Amazon Quick Suite with IAM Identity Center
site_author: AWS
repo_url: https://github.com/tomron-aws/sample-amazon-quick-suite-starter-kit/tree/terraform
repo_name: sample-amazon-quick-suite-starter-kit

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Module Development: module-development-guide.md
  - Accelerator Integration: accelerator-integration-guide.md
  - Cleanup: cleanup.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
